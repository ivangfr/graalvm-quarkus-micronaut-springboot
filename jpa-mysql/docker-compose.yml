services:

  mysql:
    image: 'mysql:9.6.0'
    container_name: 'mysql'
    restart: 'unless-stopped'
    ports:
      - '3306:3306'
    environment:
      - 'MYSQL_ROOT_PASSWORD=secret'
    volumes:
        - './mysql/init:/docker-entrypoint-initdb.d'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "--password=$$MYSQL_ROOT_PASSWORD"]
