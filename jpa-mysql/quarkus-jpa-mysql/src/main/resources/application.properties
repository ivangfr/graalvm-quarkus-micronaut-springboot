# Set this value to compare with Spring Boot and Micronaut, which have a default max-threads setting of 200.
# In Quarkus, if not specified, the max threads is automatically sized to the greater of 8 * available processors and 200.
quarkus.thread-pool.max-threads=200

quarkus.datasource.db-kind=mysql
quarkus.datasource.jdbc.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/bookdb_jvm?characterEncoding=UTF-8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
%native.quarkus.datasource.jdbc.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/bookdb_native?characterEncoding=UTF-8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
quarkus.datasource.username=root
quarkus.datasource.password=secret
quarkus.hibernate-orm.database.generation=none

# this profile is used by https://github.com/ivangfr/knative-minikube-environment/tree/master/quarkus-jpa-mysql-native-vs-jvm
%database-generation-update.quarkus.hibernate-orm.database.generation=update